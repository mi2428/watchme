name: "${COMPOSE_PROJECT_NAME:-watchme}"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    pull_policy: "${WATCHME_PULL_POLICY:-always}"
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    depends_on:
      - prometheus
      - tempo

  prometheus:
    image: prom/prometheus:latest
    pull_policy: "${WATCHME_PULL_POLICY:-always}"
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HTTP_PORT:-9090}:9090"

  tempo:
    image: grafana/tempo:latest
    pull_policy: "${WATCHME_PULL_POLICY:-always}"
    restart: unless-stopped
    command:
      - "-config.file=/etc/tempo.yaml"
      - "-backend-worker.compaction.block-retention=24h"
      - "-backend-scheduler.provider.work.compaction.block-retention=24h"
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"

  grafana:
    image: grafana/grafana:latest
    pull_policy: "${WATCHME_PULL_POLICY:-always}"
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_HTTP_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - tempo

volumes:
  grafana-data:
  prometheus-data:
  tempo-data:

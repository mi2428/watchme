included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  - identifier_name
  - nesting
  - trailing_comma

opt_in_rules:
  - array_init
  - closure_end_indentation
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 12
  error: 20

reporter: "xcode"

global:
  scrape_interval: 5s

scrape_configs:
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: otel-collector-exported
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
